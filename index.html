<!DOCTYPE html>
<html lang="ru" data-theme="autumn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Родовое дерево Шаповаловых</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.14/dist/full.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  html,body{margin:0;padding:0;overflow:hidden;height:100%;width:100%;user-select:none;}
  #app{display:flex;flex-direction:column;height:100vh;}
  #tree-wrap{flex:1;background:#f8fafc;cursor:grab;position:relative;}
  #tree-wrap:active{cursor:grabbing;}
  svg{display:block;width:100%;height:100%;}
  
  .link-spouse { stroke: #fbbf24; stroke-width: 3px; stroke-opacity: 0.8; }
  .link-child { stroke: #94a3b8; stroke-width: 1.5px; stroke-opacity: 0.6; }
  
  .node rect { transition: all 0.2s; cursor: pointer; }
  .node:hover rect { stroke: #7c3aed; stroke-width: 3px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
  .node text { pointer-events: none; font-family: sans-serif; }
  
  .controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 8px; }
  .gen-label { font-size: 12px; fill: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
  .gen-line { stroke: #e2e8f0; stroke-dasharray: 4; stroke-width: 1; }
</style>
</head>
<body>
<div id="app">
  <!-- NAV -->
  <div class="navbar bg-base-100 shadow z-10 h-14 min-h-14 flex-shrink-0">
    <div class="flex-1 px-2">
      <span class="font-bold text-lg">🌳 Родовое дерево</span>
    </div>
    <div class="flex-none gap-2 px-2">
      <input id="search-inp" type="text" placeholder="Поиск..." class="input input-sm w-40 sm:w-64" oninput="searchNode(this.value)"/>
      <button class="btn btn-sm btn-ghost" onclick="resetView()" title="Сброс вида">⊞</button>
    </div>
  </div>

  <!-- TREE CONTAINER -->
  <div id="tree-wrap">
    <svg id="svg">
      <g id="viewport">
        <g id="gen-layer"></g>
        <g id="link-layer"></g>
        <g id="node-layer"></g>
      </g>
    </svg>
    
    <div class="controls">
      <button class="btn btn-circle btn-sm shadow bg-white" onclick="changeZoom(1.2)">+</button>
      <button class="btn btn-circle btn-sm shadow bg-white" onclick="changeZoom(0.8)">-</button>
      <button class="btn btn-sm shadow bg-white" onclick="togglePhysics()" id="phys-btn">❄️ Заморозить</button>
    </div>
  </div>
</div>

<!-- INFO MODAL -->
<dialog id="modal" class="modal">
  <div class="modal-box w-full max-w-md">
    <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button></form>
    <div id="modal-content"></div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
// CONFIG
const W_NODE = 140, H_NODE = 60;
const Y_STEP = 140; // Height between generations
const CHARGE = -800;
const LINK_DIST_SPOUSE = 60;
const LINK_DIST_CHILD = 100;

// STATE
let PERSONS = {};
let nodes = [], links = [];
let simulation;
let zoom;
let svg, gView, gNodes, gLinks, gGen;
let isFrozen = false;

// INIT
async function init() {
  try {
    const r = await fetch('persons.json');
    PERSONS = await r.json();
    setupD3();
    buildGraph();
    startSim();
  } catch(e) { console.error(e); alert('Ошибка загрузки данных'); }
}

function setupD3() {
  svg = d3.select('#svg');
  gView = d3.select('#viewport');
  gGen = d3.select('#gen-layer');
  gLinks = d3.select('#link-layer');
  gNodes = d3.select('#node-layer');

  zoom = d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', e => gView.attr('transform', e.transform));
  
  svg.call(zoom).on('dblclick.zoom', null);
  
  // Responsive resize
  window.addEventListener('resize', () => {
    simulation.alpha(0.3).restart();
  });
}

// GRAPH BUILDER
function buildGraph() {
  // 1. Assign Generations (BFS)
  const roots = Object.values(PERSONS).filter(p => !p.parents || p.parents.length === 0);
  const genMap = {};
  const q = roots.map(p => ({id: p.key, g: 0}));
  const visited = new Set();
  
  // Init all with 0 (default)
  Object.keys(PERSONS).forEach(k => genMap[k] = 0);

  // Run BFS
  while(q.length) {
    const {id, g} = q.shift();
    if(visited.has(id)) {
      if(g > genMap[id]) genMap[id] = g; // Push down if found deeper path
      continue;
    }
    visited.add(id);
    genMap[id] = g;
    
    const p = PERSONS[id];
    // Spouses = same gen
    (p.spouses || []).forEach(sid => {
      if(PERSONS[sid]) q.push({id: sid, g: g});
    });
    // Children = next gen
    (p.children || []).forEach(cid => {
      if(PERSONS[cid]) q.push({id: cid, g: g + 1});
    });
  }
  
  // Normalize gens (start from 0)
  const minG = Math.min(...Object.values(genMap));
  Object.keys(genMap).forEach(k => genMap[k] -= minG);

  // 2. Create Nodes
  nodes = Object.values(PERSONS).map(p => ({
    id: p.key,
    data: p,
    gen: genMap[p.key] || 0,
    x: 0, 
    y: (genMap[p.key] || 0) * Y_STEP
  }));

  // 3. Create Links
  links = [];
  const processed = new Set();
  
  nodes.forEach(n => {
    const p = n.data;
    
    // Spouse links (bidirectional, add once)
    (p.spouses || []).forEach(sid => {
      const pair = [n.id, sid].sort().join('|');
      if(!processed.has(pair) && PERSONS[sid]) {
        processed.add(pair);
        links.push({source: n.id, target: sid, type: 'spouse'});
      }
    });

    // Parent -> Child links
    (p.children || []).forEach(cid => {
      if(PERSONS[cid]) {
        links.push({source: n.id, target: cid, type: 'child'});
      }
    });
  });

  drawGenerations(Math.max(...Object.values(genMap)));
}

function drawGenerations(maxGen) {
  gGen.selectAll('*').remove();
  for(let i=0; i<=maxGen; i++) {
    const y = i * Y_STEP;
    gGen.append('line')
      .attr('class', 'gen-line')
      .attr('x1', -5000).attr('x2', 5000)
      .attr('y1', y).attr('y2', y);
    gGen.append('text')
      .attr('class', 'gen-label')
      .attr('x', -480).attr('y', y - 5)
      .text(`ПОКОЛЕНИЕ ${i+1}`);
  }
}

// SIMULATION
function startSim() {
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(d => d.type === 'spouse' ? LINK_DIST_SPOUSE : LINK_DIST_CHILD)
      .strength(d => d.type === 'spouse' ? 1.5 : 0.8)
    )
    .force('charge', d3.forceManyBody().strength(CHARGE))
    .force('collide', d3.forceCollide().radius(W_NODE/1.5).strength(1))
    .force('y', d3.forceY().y(d => d.gen * Y_STEP).strength(4)) // Strict layers
    .force('x', d3.forceX().strength(0.02)) // Slight center gravity
    .on('tick', ticked);

  // Drag behavior
  const drag = d3.drag()
    .on('start', e => {
      if(!e.active) simulation.alphaTarget(0.3).restart();
      e.subject.fx = e.subject.x;
      e.subject.fy = e.subject.y;
    })
    .on('drag', e => {
      e.subject.fx = e.x;
      e.subject.fy = e.y;
    })
    .on('end', e => {
      if(!e.active) simulation.alphaTarget(0);
      e.subject.fx = null;
      e.subject.fy = null;
    });

  // Render Links
  const link = gLinks.selectAll('line')
    .data(links)
    .enter().append('line')
    .attr('class', d => d.type === 'spouse' ? 'link-spouse' : 'link-child');

  // Render Nodes
  const node = gNodes.selectAll('.node')
    .data(nodes)
    .enter().append('g')
    .attr('class', 'node')
    .call(drag)
    .on('click', (e, d) => {
       if (e.defaultPrevented) return; // ignore drag-click
       openModal(d.data);
    });

  // Node Shape
  node.append('rect')
    .attr('width', W_NODE).attr('height', H_NODE)
    .attr('x', -W_NODE/2).attr('y', -H_NODE/2)
    .attr('rx', 8).attr('ry', 8)
    .attr('fill', d => getGenderColor(d.data))
    .attr('stroke', '#cbd5e1')
    .attr('stroke-width', 2);

  // Photo / Initial
  node.each(function(d) {
    const g = d3.select(this);
    const sz = 40;
    const x = -W_NODE/2 + 10;
    const y = -sz/2;
    
    // Clip path for photo
    const clipId = 'clip-' + d.id.replace(/[^a-z0-9]/gi,'');
    g.append('clipPath').attr('id', clipId)
     .append('circle').attr('cx', x + sz/2).attr('cy', y + sz/2).attr('r', sz/2);

    if(d.data.photo) {
      g.append('image')
        .attr('href', 'photos/' + d.data.photo)
        .attr('x', x).attr('y', y)
        .attr('width', sz).attr('height', sz)
        .attr('clip-path', `url(#${clipId})`)
        .attr('preserveAspectRatio', 'xMidYMid slice')
        .on('error', function() { d3.select(this).remove(); drawInitial(g, d.data, x, y, sz); });
    } else {
      drawInitial(g, d.data, x, y, sz);
    }
  });

  // Text Name
  node.append('text')
    .attr('x', -W_NODE/2 + 60).attr('y', -5)
    .attr('font-size', '12px').attr('font-weight', 'bold')
    .attr('fill', '#1e293b')
    .text(d => truncate(d.data.full_name || d.data.first_name, 12));

  // Text Dates
  node.append('text')
    .attr('x', -W_NODE/2 + 60).attr('y', 12)
    .attr('font-size', '10px').attr('fill', '#64748b')
    .text(d => cleanDates(d.data));

  function ticked() {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);

    node.attr('transform', d => `translate(${d.x},${d.y})`);
  }
}

// HELPERS
function getGenderColor(p) {
  const name = (p.first_name || p.full_name || '').toLowerCase();
  const maleEnds = ['й', 'м', 'н', 'р', 'с', 'в']; // Heuristic
  // Simple heuristics, can be improved or read from data if available
  const first = name.split(' ')[0];
  if(['анна','мария','ольга','елена','татьяна','наталья','светлана'].includes(first)) return '#eff6ff'; // Female (blue tint)
  if(['александр','сергей','иван','владимир'].includes(first)) return '#f0fdf4'; // Male (green tint)
  return '#ffffff'; // Default white
}

function drawInitial(g, p, x, y, sz) {
  g.append('circle').attr('cx', x+sz/2).attr('cy', y+sz/2).attr('r', sz/2).attr('fill', '#e2e8f0');
  g.append('text').attr('x', x+sz/2).attr('y', y+sz/2+5).attr('text-anchor', 'middle')
    .attr('font-size', '16px').attr('font-weight', 'bold').attr('fill', '#64748b')
    .text((p.first_name || p.full_name || '?')[0]);
}

function truncate(str, n) {
  if(!str) return '';
  return str.length > n ? str.substr(0,n-1) + '..' : str;
}

function cleanDates(p) {
  const b = (p.birth || '').substr(0,4);
  const d = (p.death || '').substr(0,4);
  if(!b) return '';
  return b + (d ? ' - ' + d : '');
}

// UI ACTIONS
function searchNode(q) {
  const term = q.toLowerCase();
  gNodes.selectAll('.node rect').attr('stroke', '#cbd5e1').attr('stroke-width', 2);
  
  if(!term) return;
  const match = nodes.find(n => 
    (n.data.full_name || '').toLowerCase().includes(term) ||
    (n.data.first_name || '').toLowerCase().includes(term)
  );
  
  if(match) {
    gNodes.selectAll('.node').filter(d => d.id === match.id)
      .select('rect').attr('stroke', '#ea580c').attr('stroke-width', 4);
    
    // Pan to node
    svg.transition().duration(750).call(
      zoom.transform,
      d3.zoomIdentity.translate(window.innerWidth/2 - match.x, window.innerHeight/2 - match.y).scale(1)
    );
  }
}

function togglePhysics() {
  const btn = document.getElementById('phys-btn');
  if(isFrozen) {
    simulation.alpha(0.3).restart();
    btn.innerText = '❄️ Заморозить';
    isFrozen = false;
  } else {
    simulation.stop();
    btn.innerText = '▶️ Запустить';
    isFrozen = true;
  }
}

function changeZoom(factor) {
  svg.transition().call(zoom.scaleBy, factor);
}

function resetView() {
  svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity);
}

function openModal(p) {
  const content = document.getElementById('modal-content');
  const rels = (label, arr) => {
    if(!arr || !arr.length) return '';
    return `<div class="mt-2"><div class="font-bold text-xs uppercase text-gray-400">${label}</div>` +
    arr.map(id => {
      const per = PERSONS[id];
      return per ? `<span class="badge badge-outline mr-1 cursor-pointer hover:bg-base-200" onclick="searchNode('${per.full_name}')">${per.full_name}</span>` : '';
    }).join('') + `</div>`;
  };

  content.innerHTML = `
    <h3 class="font-bold text-xl">${p.full_name || p.first_name}</h3>
    <div class="text-gray-500 text-sm mb-4">${cleanDates(p)}</div>
    ${p.photo ? `<img src="photos/${p.photo}" class="w-full max-h-64 object-contain rounded-lg bg-base-200 mb-4">` : ''}
    ${p.profession ? `<div class="badge badge-primary mb-4">${p.profession}</div>` : ''}
    
    <div class="divider">Семья</div>
    ${rels('Супруги', p.spouses)}
    ${rels('Родители', p.parents)}
    ${rels('Дети', p.children)}
  `;
  document.getElementById('modal').showModal();
}

init();
</script>
</body>
</html>
