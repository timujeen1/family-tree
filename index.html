<!DOCTYPE html>
<html lang="ru" data-theme="autumn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Родовое дерево Шаповаловых</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.14/dist/full.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  html,body{margin:0;padding:0;overflow:hidden;height:100%;width:100%;}
  #app{display:flex;flex-direction:column;height:100vh;}
  #tree-wrap{flex:1;overflow:hidden;background:#fdf6ec;cursor:grab;}
  #tree-wrap:active{cursor:grabbing;}
  svg{display:block;}
  .person-node{cursor:pointer;}
  .person-node rect{transition:filter .15s;}
  .person-node:hover rect{filter:drop-shadow(0 4px 12px rgba(0,0,0,.25));}
  .couple-line{stroke:#b8864e;stroke-width:2;fill:none;}
  .child-line{stroke:#b8864e;stroke-width:1.5;fill:none;}
  .rel-link{cursor:pointer;fill:#7c3aed;text-decoration:underline;}
  .search-highlight rect{stroke:#7c3aed!important;stroke-width:3!important;}
</style>
</head>
<body>
<div id="app">
  <!-- NAV -->
  <div class="navbar bg-base-100 shadow z-10 h-14 min-h-14 flex-shrink-0">
    <div class="flex-1 pl-3">
      <span class="font-bold text-lg">🌳 Родовое дерево Шаповаловых</span>
    </div>
    <div class="flex-none gap-2 pr-3">
      <input id="search-inp" type="text" placeholder="Поиск..." class="input input-sm w-40"
        oninput="searchPerson(this.value)" />
      <button class="btn btn-sm btn-ghost" onclick="resetView()" title="Вся семья">⊞</button>
    </div>
  </div>

  <!-- TREE -->
  <div id="tree-wrap">
    <svg id="tree-svg"><g id="tree-g"></g></svg>
  </div>
</div>

<!-- MODAL -->
<dialog id="pm" class="modal">
  <div class="modal-box w-full max-w-md">
    <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button></form>
    <div id="pm-body"></div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════
const NW = 130, NH = 80, XGAP = 30, YGAP = 100;
const FEMALE_COLOR = '#dbeafe', MALE_COLOR = '#dcfce7', UNKNOWN_COLOR = '#f3f4f6';
const LINE_COLOR = '#b8864e';

const FEMALE_NAMES = new Set(['наталия','наталья','елизавета','лидия','виктория','лариса','светлана','адель','оксана','екатерина','ольга','прасковия','миля','тоня','лена','дуня','татьяна','марьяна','галина','галя','валя','нина','жанна','рая','люда','соня','христя','варвара','пелагея','олена','диана','настя','кира','аня','алла','тамила','ирина','ира','мария','маня','зина','лиза','арина','тетяна','люба','лидия','юлия','оришка','вера','ксения','дина','дарья','катя','света','валя']);

let PERSONS = {};
let layout = {}; // key -> {x, y, gen}
let svgG, zoom, svgEl;

// ═══════════════════════════════════════════════════
//  LOAD & INIT
// ═══════════════════════════════════════════════════
async function loadData() {
  const r = await fetch('persons.json');
  PERSONS = await r.json();
  buildLayout();
  renderTree();
  setTimeout(() => centerOn('Шаповалов Тимофей_1'), 100);
}

// ═══════════════════════════════════════════════════
//  GENERATION ASSIGNMENT (BFS from roots)
// ═══════════════════════════════════════════════════
function buildLayout() {
  const gen = {};
  const visited = new Set();

  // roots = persons with no known parents
  const roots = Object.keys(PERSONS).filter(k => !(PERSONS[k].parents?.length));

  const queue = roots.map(k => [k, 0]);
  while (queue.length) {
    const [k, g] = queue.shift();
    if (visited.has(k)) {
      if ((gen[k] || 0) < g) gen[k] = g; // push down if needed
      continue;
    }
    visited.add(k);
    gen[k] = g;
    const p = PERSONS[k];
    if (!p) continue;
    (p.spouses || []).forEach(sk => { if (!visited.has(sk)) queue.unshift([sk, g]); });
    (p.children || []).forEach(ck => { if (!visited.has(ck)) queue.push([ck, g + 1]); });
  }
  // Unvisited (disconnected): put at max gen
  const maxG = Math.max(0, ...Object.values(gen));
  Object.keys(PERSONS).forEach(k => { if (gen[k] == null) gen[k] = maxG; });

  // ── X layout per generation ──────────────────────
  // Group each generation: keep spouses adjacent, family groups together
  const byGen = {};
  Object.keys(PERSONS).forEach(k => {
    const g = gen[k];
    (byGen[g] = byGen[g] || []).push(k);
  });

  // For each generation, sort by:
  // 1. Which parent group they belong to (keeps siblings together)
  // 2. Spouse pairs adjacent
  const sorted = {};
  Object.entries(byGen).forEach(([g, keys]) => {
    // Build family groups: keys with same parents grouped together, then couples adjacent
    const familyKey = k => {
      const p = PERSONS[k];
      const parents = (p.parents || []).slice().sort().join('|');
      return parents || 'root';
    };
    // Group by family
    const groups = {};
    keys.forEach(k => {
      const fk = familyKey(k);
      (groups[fk] = groups[fk] || []).push(k);
    });
    // Within each group, keep couples adjacent
    const ordered = [];
    Object.values(groups).forEach(grp => {
      const placed = new Set();
      grp.forEach(k => {
        if (placed.has(k)) return;
        placed.add(k);
        ordered.push(k);
        // Place spouse right after
        const p = PERSONS[k];
        (p.spouses || []).forEach(sk => {
          if (grp.includes(sk) && !placed.has(sk)) {
            placed.add(sk);
            ordered.push(sk);
          }
        });
      });
    });
    sorted[g] = ordered;
  });

  // Assign x sequentially
  const x = {}, y = {};
  Object.entries(sorted).forEach(([g, keys]) => {
    keys.forEach((k, i) => {
      x[k] = i * (NW + XGAP);
      y[k] = Number(g) * (NH + YGAP);
    });
  });

  layout = { gen, x, y, sorted };
}

// ═══════════════════════════════════════════════════
//  GENDER DETECTION
// ═══════════════════════════════════════════════════
function gender(p) {
  const name = (p.first_name || p.full_name || '').trim().toLowerCase();
  const first = name.split(' ')[0];
  if (FEMALE_NAMES.has(first)) return 'f';
  // Common male endings in Russian
  if (/[йнм]$/.test(first) || /ий$/.test(first) || /ев$/.test(first)) return 'm';
  return '?';
}

function nodeColor(p) {
  const g = gender(p);
  return g === 'f' ? FEMALE_COLOR : g === 'm' ? MALE_COLOR : UNKNOWN_COLOR;
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function renderTree() {
  svgEl = document.getElementById('tree-svg');
  const wrap = document.getElementById('tree-wrap');
  svgEl.setAttribute('width', wrap.clientWidth);
  svgEl.setAttribute('height', wrap.clientHeight);

  svgG = d3.select('#tree-g');
  svgG.selectAll('*').remove();

  const persons = Object.values(PERSONS);
  const xs = Object.values(layout.x);
  const ys = Object.values(layout.y);
  const totalW = Math.max(...xs) + NW + 40;
  const totalH = Math.max(...ys) + NH + 40;

  zoom = d3.zoom()
    .scaleExtent([0.05, 3])
    .on('zoom', e => svgG.attr('transform', e.transform));
  d3.select(svgEl).call(zoom);

  // ── Draw couple + child connectors ────────────────
  const drawnCouples = new Set();
  persons.forEach(p => {
    (p.spouses || []).forEach(sk => {
      const cid = [p.key, sk].sort().join('|');
      if (drawnCouples.has(cid)) return;
      drawnCouples.add(cid);
      const sp = PERSONS[sk];
      if (!sp) return;

      const x1 = layout.x[p.key] + NW, y1 = layout.y[p.key] + NH / 2;
      const x2 = layout.x[sk], y2 = layout.y[sk] + NH / 2;
      const mx = (x1 + (x1 + NW + x2) / 2) / 2; // midpoint of couple line

      // Couple line
      svgG.append('line')
        .attr('class', 'couple-line')
        .attr('x1', x1).attr('y1', y1)
        .attr('x2', x2).attr('y2', y2);

      // Find children of THIS couple
      const children = (p.children || []).filter(ck => (PERSONS[ck]?.parents || []).includes(sk));
      if (!children.length) return;

      const midX = (x1 + x2) / 2;
      const startY = y1;
      const dropY = startY + NH / 2 + YGAP * 0.35;

      // Drop line from couple midpoint
      svgG.append('line').attr('class', 'child-line')
        .attr('x1', midX).attr('y1', startY)
        .attr('x2', midX).attr('y2', dropY);

      // Horizontal bar spanning all children
      const childXs = children.map(ck => layout.x[ck] + NW / 2);
      const minCX = Math.min(...childXs), maxCX = Math.max(...childXs);
      if (children.length > 1) {
        svgG.append('line').attr('class', 'child-line')
          .attr('x1', Math.min(midX, minCX)).attr('y1', dropY)
          .attr('x2', Math.max(midX, maxCX)).attr('y2', dropY);
      }

      // Lines down to each child
      children.forEach(ck => {
        const cx = layout.x[ck] + NW / 2, cy = layout.y[ck];
        svgG.append('line').attr('class', 'child-line')
          .attr('x1', cx).attr('y1', dropY)
          .attr('x2', cx).attr('y2', cy);
      });
    });
  });

  // Single-parent connectors (persons with 1 parent)
  persons.forEach(p => {
    if (!p.parents?.length) return;
    const singleParent = p.parents.find(pk => {
      const par = PERSONS[pk];
      if (!par) return false;
      const hasCommonChild = (par.spouses || []).some(sk =>
        (PERSONS[p.parents[0]]?.spouses || []).includes(sk) ||
        p.parents.includes(sk)
      );
      return !hasCommonChild && p.parents.length === 1;
    });
    if (singleParent) {
      const px = layout.x[singleParent] + NW / 2, py = layout.y[singleParent] + NH;
      const cx = layout.x[p.key] + NW / 2, cy = layout.y[p.key];
      svgG.append('path').attr('class', 'child-line')
        .attr('d', `M${px},${py} L${px},${(py+cy)/2} L${cx},${(py+cy)/2} L${cx},${cy}`);
    }
  });

  // ── Draw person nodes ──────────────────────────────
  const nodes = svgG.selectAll('.person-node')
    .data(persons)
    .enter().append('g')
    .attr('class', 'person-node')
    .attr('data-key', d => d.key)
    .attr('transform', d => `translate(${layout.x[d.key]},${layout.y[d.key]})`)
    .on('click', (e, d) => openModal(d.key));

  // Card background
  nodes.append('rect')
    .attr('width', NW).attr('height', NH)
    .attr('rx', 8).attr('ry', 8)
    .attr('fill', d => nodeColor(d))
    .attr('stroke', LINE_COLOR)
    .attr('stroke-width', 1.5)
    .attr('filter', 'drop-shadow(0 2px 4px rgba(0,0,0,.12))');

  // Photo or initial circle
  nodes.each(function(d) {
    const g = d3.select(this);
    const cx = 24, cy = 24, r = 18;
    if (d.photo) {
      // Clip path for circular photo
      const clipId = `clip-${d.key.replace(/[^a-z0-9]/gi,'_')}`;
      svgG.append('clipPath').attr('id', clipId)
        .append('circle').attr('cx', layout.x[d.key]+cx).attr('cy', layout.y[d.key]+cy).attr('r', r);
      g.append('image')
        .attr('href', `photos/${d.photo}`)
        .attr('x', cx-r).attr('y', cy-r)
        .attr('width', r*2).attr('height', r*2)
        .attr('clip-path', `url(#${clipId})`)
        .attr('preserveAspectRatio', 'xMidYMid slice')
        .on('error', function(){ d3.select(this).remove(); drawInitial(g, d, cx, cy, r); });
    } else {
      drawInitial(g, d, cx, cy, r);
    }
  });

  function drawInitial(g, d, cx, cy, r) {
    const col = gender(d) === 'f' ? '#3b82f6' : gender(d) === 'm' ? '#16a34a' : '#6b7280';
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r).attr('fill',col);
    g.append('text')
      .attr('x',cx).attr('y',cy+5)
      .attr('text-anchor','middle').attr('fill','white')
      .attr('font-size',14).attr('font-weight','bold')
      .text((d.first_name || d.full_name || '?')[0]);
  }

  // Name text
  nodes.append('text')
    .attr('x', 50).attr('y', 18)
    .attr('font-size', 11).attr('font-weight', '600')
    .attr('fill', '#1f2937')
    .each(function(d) {
      const name = d.full_name || d.first_name || '?';
      const words = name.split(' ');
      const el = d3.select(this);
      // Max 2 lines
      if (words.length === 1 || name.length <= 14) {
        el.text(name);
      } else {
        const mid = Math.ceil(words.length/2);
        el.append('tspan').attr('x',50).attr('dy',0).text(words.slice(0,mid).join(' '));
        el.append('tspan').attr('x',50).attr('dy',13).text(words.slice(mid).join(' '));
      }
    });

  // Dates
  nodes.append('text')
    .attr('x', 50).attr('y', 55)
    .attr('font-size', 9).attr('fill', '#6b7280')
    .text(d => {
      let s = d.birth ? d.birth.substring(0,4) : '';
      if (d.death) s += '–' + d.death.substring(0,4);
      return s;
    });

  // Profession badge (small)
  nodes.each(function(d) {
    if (!d.profession) return;
    const prof = d.profession.split('  ')[0].substring(0,18);
    d3.select(this).append('text')
      .attr('x', 50).attr('y', 68)
      .attr('font-size', 8).attr('fill', '#7c3aed')
      .attr('font-style','italic')
      .text(prof);
  });
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
function centerOn(key) {
  const wrap = document.getElementById('tree-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const px = layout.x[key] ?? 0, py = layout.y[key] ?? 0;
  const tx = W/2 - (px + NW/2), ty = H/2 - (py + NH/2);
  d3.select(svgEl).transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(1));
}

function resetView() {
  const wrap = document.getElementById('tree-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const xs = Object.values(layout.x), ys = Object.values(layout.y);
  const totalW = Math.max(...xs) + NW, totalH = Math.max(...ys) + NH;
  const scale = Math.min(W / (totalW + 80), H / (totalH + 80), 1);
  const tx = (W - totalW * scale) / 2, ty = (H - totalH * scale) / 2;
  d3.select(svgEl).transition().duration(600)
    .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// ═══════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════
let searchTimeout;
function searchPerson(q) {
  clearTimeout(searchTimeout);
  svgG.selectAll('.person-node').classed('search-highlight', false);
  if (!q.trim()) return;
  searchTimeout = setTimeout(() => {
    const norm = q.toLowerCase();
    const found = Object.values(PERSONS).filter(p =>
      (p.full_name||'').toLowerCase().includes(norm) ||
      (p.first_name||'').toLowerCase().includes(norm)
    );
    if (found.length) {
      svgG.selectAll('.person-node')
        .classed('search-highlight', d => found.some(f => f.key === d.key));
      centerOn(found[0].key);
    }
  }, 300);
}

// ═══════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════
function openModal(key) {
  const p = PERSONS[key];
  if (!p) return;
  const relSection = (label, keys, emoji) => {
    const items = (keys||[]).filter(k => PERSONS[k]);
    if (!items.length) return '';
    return `<div class="mb-2"><span class="text-sm font-semibold">${emoji} ${label}:</span> ` +
      items.map(k => `<span class="link link-primary text-sm cursor-pointer" onclick="goTo('${k}')">${PERSONS[k].full_name||PERSONS[k].first_name}</span>`).join(', ') + '</div>';
  };
  const photoHtml = p.photo
    ? `<img src="photos/${p.photo}" class="w-20 h-20 rounded-full object-cover" onerror="this.style.display='none'">`
    : `<div class="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold text-white" style="background:${gender(p)==='f'?'#3b82f6':gender(p)==='m'?'#16a34a':'#6b7280'}">${(p.first_name||p.full_name||'?')[0]}</div>`;
  document.getElementById('pm-body').innerHTML = `
    <h3 class="font-bold text-lg mb-3 pr-6">${p.full_name||p.first_name||'?'}</h3>
    <div class="flex gap-4 mb-4">
      ${photoHtml}
      <div class="flex-1 text-sm">
        ${p.birth?`<div><b>Рождение:</b> ${p.birth}</div>`:''}
        ${p.death?`<div><b>Смерть:</b> ${p.death}</div>`:''}
        ${p.profession?`<div class="badge badge-outline badge-sm mt-1">${p.profession}</div>`:''}
      </div>
    </div>
    <div class="divider my-2"></div>
    ${relSection('Супруг(а)', p.spouses, '💑')}
    ${relSection('Родители', p.parents, '👨‍👩‍👧')}
    ${relSection('Братья/Сёстры', p.siblings, '👫')}
    ${relSection('Дети', p.children, '👶')}
    <div class="modal-action mt-3">
      <button class="btn btn-sm btn-outline" onclick="goTo('${key}')">🎯 Центрировать</button>
      <form method="dialog"><button class="btn btn-sm">Закрыть</button></form>
    </div>`;
  document.getElementById('pm').showModal();
}

function goTo(key) {
  document.getElementById('pm').close();
  centerOn(key);
}

// ═══════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════
window.addEventListener('resize', () => {
  const wrap = document.getElementById('tree-wrap');
  svgEl.setAttribute('width', wrap.clientWidth);
  svgEl.setAttribute('height', wrap.clientHeight);
});

loadData();
</script>
</body>
</html>
