<!DOCTYPE html>
<html lang="ru" data-theme="autumn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Родовое дерево Шаповаловых</title>
<link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.14/dist/full.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  html,body{margin:0;padding:0;overflow:hidden;height:100%;width:100%;user-select:none;}
  #app{display:flex;flex-direction:column;height:100vh;}
  #tree-wrap{flex:1;background:#f5f0eb;cursor:grab;position:relative;}
  #tree-wrap:active{cursor:grabbing;}
  svg{display:block;width:100%;height:100%;}

  /* Links */
  .link-spouse{stroke:#f59e0b;stroke-width:2.5px;stroke-opacity:0.9;fill:none;}
  .link-child{stroke:#94a3b8;stroke-width:1.5px;stroke-opacity:0.5;fill:none;}
  .link-child.highlighted{stroke:#f59e0b;stroke-width:2px;stroke-opacity:0.9;}

  /* Nodes */
  .node{cursor:pointer;}
  .node rect{transition:all 0.15s;}
  .node:hover rect{stroke:#7c3aed!important;stroke-width:2.5px;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.2));}
  .node.found rect{stroke:#ea580c!important;stroke-width:3px;}
  .node.dim{opacity:0.25;}

  /* Generation bands */
  .gen-band-even{fill:#f0ebe4;fill-opacity:0.5;}
  .gen-band-odd{fill:#e8e2da;fill-opacity:0.5;}
  .gen-label{font-size:11px;fill:#a0916a;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}

  /* Controls */
  .controls{position:absolute;bottom:16px;right:16px;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
</style>
</head>
<body>
<div id="app">
  <!-- NAV -->
  <div class="navbar bg-base-100 shadow z-10 h-14 min-h-14 flex-shrink-0">
    <div class="flex-1 px-2">
      <span class="font-bold text-lg">🌳 Родовое дерево Шаповаловых</span>
    </div>
    <div class="flex-none gap-2 px-2">
      <input id="search-inp" type="text" placeholder="Поиск..." class="input input-sm w-36 sm:w-60"
             oninput="onSearch(this.value)" onkeydown="if(event.key==='Escape'){this.value='';onSearch('');}"/>
      <button class="btn btn-sm btn-ghost" onclick="resetView()" title="Показать всё">⊞</button>
    </div>
  </div>

  <!-- TREE -->
  <div id="tree-wrap">
    <svg id="svg">
      <g id="viewport">
        <g id="gen-layer"></g>
        <g id="link-layer"></g>
        <g id="node-layer"></g>
      </g>
    </svg>
    <div class="controls">
      <button class="btn btn-circle btn-sm shadow bg-white" onclick="changeZoom(1.3)" title="Приблизить">+</button>
      <button class="btn btn-circle btn-sm shadow bg-white" onclick="changeZoom(0.77)" title="Отдалить">−</button>
      <button class="btn btn-sm shadow bg-white text-warning" onclick="showOrphans()" title="Люди без связей">⚠ Без связей</button>
    </div>
  </div>
</div>

<!-- INFO MODAL -->
<dialog id="modal" class="modal">
  <div class="modal-box w-full max-w-md max-h-screen overflow-y-auto">
    <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-3 top-3">✕</button></form>
    <div id="modal-content"></div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
// ── CONFIG ──────────────────────────────────────
const W = 150, H = 54;          // node size
const INIT_SCALE = 0.18;        // initial zoom to fit whole tree
const INIT_TX = 40, INIT_TY = 40;

// ── STATE ────────────────────────────────────────
let PERSONS = {};               // key → person object (with x,y from VSDX via canvas)
let allNodes = [];              // D3 node objects
let allLinks = [];              // D3 link objects
let svgSel, gView, gNodes, gLinks, gGen, zoomBeh;

// ── BOOT ─────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('persons.json');
    PERSONS = await r.json();
    setupSVG();
    buildGraph();
    drawGenBands();
    renderLinks();
    renderNodes();
    // Initial view: fit entire tree
    svgSel.call(zoomBeh.transform,
      d3.zoomIdentity.translate(INIT_TX, INIT_TY).scale(INIT_SCALE));
  } catch(e) {
    console.error(e);
    alert('Ошибка загрузки данных');
  }
}

// ── SVG SETUP ────────────────────────────────────
function setupSVG() {
  svgSel = d3.select('#svg');
  gView  = d3.select('#viewport');
  gGen   = d3.select('#gen-layer');
  gLinks = d3.select('#link-layer');
  gNodes = d3.select('#node-layer');

  zoomBeh = d3.zoom()
    .scaleExtent([0.05, 5])
    .on('zoom', e => gView.attr('transform', e.transform));

  svgSel.call(zoomBeh).on('dblclick.zoom', null);
}

// ── GRAPH ────────────────────────────────────────
function buildGraph() {
  // Only persons with VSDX positions
  allNodes = Object.values(PERSONS)
    .filter(p => p.x != null && p.y != null)
    .map(p => ({ id: p.key, data: p, x: p.x, y: p.y }));

  const nodeSet = new Set(allNodes.map(n => n.id));
  const seen = new Set();

  allNodes.forEach(n => {
    const p = n.data;
    // Parent → child edges
    (p.children || []).forEach(cid => {
      if (!nodeSet.has(cid)) return;
      const key = `${n.id}→${cid}`;
      if (!seen.has(key)) { seen.add(key); allLinks.push({ s: n.id, t: cid, type: 'child' }); }
    });
    // Spouse edges (deduplicated)
    (p.spouses || []).forEach(sid => {
      if (!nodeSet.has(sid)) return;
      const pair = [n.id, sid].sort().join('|');
      if (!seen.has(pair)) { seen.add(pair); allLinks.push({ s: n.id, t: sid, type: 'spouse' }); }
    });
  });
}

// ── GENERATION BANDS ─────────────────────────────
function drawGenBands() {
  // Cluster Y values into generation groups (gap > 200px = new generation)
  const ys = allNodes.map(n => n.y).sort((a,b) => a-b);
  const clusters = [];
  let cur = [ys[0]];
  for (let i = 1; i < ys.length; i++) {
    if (ys[i] - ys[i-1] > 200) { clusters.push(cur); cur = []; }
    cur.push(ys[i]);
  }
  clusters.push(cur);

  // Cluster centers
  const centers = clusters.map(c => (Math.min(...c) + Math.max(...c)) / 2);

  // Band boundaries: midpoints between consecutive centers
  const bounds = [-Infinity];
  for (let i = 1; i < centers.length; i++) {
    bounds.push((centers[i-1] + centers[i]) / 2);
  }
  bounds.push(Infinity);

  const xMin = Math.min(...allNodes.map(n => n.x)) - 600;
  const xMax = Math.max(...allNodes.map(n => n.x)) + 600;
  const totalW = xMax - xMin;

  const genNames = [
    'Основатели', 'Прапрадеды', 'Прадеды', 'Деды', 'Поколение 5',
    'Поколение 6', 'Родители', 'Наше поколение', 'Дети'
  ];

  gGen.selectAll('*').remove();

  centers.forEach((yc, i) => {
    const yTop  = bounds[i]   === -Infinity ? yc - 400 : bounds[i];
    const yBot  = bounds[i+1] ===  Infinity ? yc + 400 : bounds[i+1];
    const bh = yBot - yTop;
    gGen.append('rect')
      .attr('class', i % 2 === 0 ? 'gen-band-even' : 'gen-band-odd')
      .attr('x', xMin).attr('y', yTop)
      .attr('width', totalW).attr('height', bh);
    gGen.append('text')
      .attr('class', 'gen-label')
      .attr('x', xMin + 14).attr('y', yTop + 18)
      .text(genNames[i] || `Поколение ${i+1}`);
  });
}

// ── LINKS ─────────────────────────────────────────
function renderLinks() {
  const nodeMap = Object.fromEntries(allNodes.map(n => [n.id, n]));
  gLinks.selectAll('*').remove();

  allLinks.forEach(lk => {
    const s = nodeMap[lk.s], t = nodeMap[lk.t];
    if (!s || !t) return;

    if (lk.type === 'spouse') {
      // Straight horizontal line between spouses
      const x1 = s.x < t.x ? s.x + W/2 : s.x - W/2;
      const x2 = s.x < t.x ? t.x - W/2 : t.x + W/2;
      const y = (s.y + t.y) / 2;
      gLinks.append('line')
        .datum(lk)
        .attr('class', 'link-spouse')
        .attr('x1', x1).attr('y1', s.y)
        .attr('x2', x2).attr('y2', t.y);
    } else {
      // Orthogonal parent→child path
      const px = s.x, py = s.y + H/2;
      const cx = t.x, cy = t.y - H/2;
      const my = (py + cy) / 2;
      gLinks.append('path')
        .datum(lk)
        .attr('class', 'link-child')
        .attr('d', `M${px},${py} L${px},${my} L${cx},${my} L${cx},${cy}`);
    }
  });
}

// ── NODES ─────────────────────────────────────────
function renderNodes() {
  gNodes.selectAll('*').remove();

  const node = gNodes.selectAll('.node')
    .data(allNodes)
    .enter().append('g')
    .attr('class', 'node')
    .attr('data-id', d => d.id)
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .on('click', (e, d) => openModal(d.data));

  // Background rect
  node.append('rect')
    .attr('x', -W/2).attr('y', -H/2)
    .attr('width', W).attr('height', H)
    .attr('rx', 7).attr('ry', 7)
    .attr('fill', d => nodeColor(d.data))
    .attr('stroke', '#c9b89a')
    .attr('stroke-width', 1.5);

  // Photo or initial
  const PHOTO_R = 20;
  const photoX = -W/2 + 8;
  const photoY = 0;

  node.each(function(d) {
    const g = d3.select(this);
    const clipId = 'clip_' + d.id.replace(/[^\w]/g, '_');
    g.append('clipPath').attr('id', clipId)
     .append('circle').attr('cx', photoX + PHOTO_R).attr('cy', photoY).attr('r', PHOTO_R);

    if (d.data.photo) {
      g.append('image')
        .attr('href', 'photos/' + d.data.photo)
        .attr('x', photoX).attr('y', photoY - PHOTO_R)
        .attr('width', PHOTO_R*2).attr('height', PHOTO_R*2)
        .attr('clip-path', `url(#${clipId})`)
        .attr('preserveAspectRatio', 'xMidYMid slice')
        .on('error', function() {
          d3.select(this).remove();
          drawInitial(g, d.data, photoX + PHOTO_R, photoY, PHOTO_R);
        });
    } else {
      drawInitial(g, d.data, photoX + PHOTO_R, photoY, PHOTO_R);
    }
  });

  // Name text
  const textX = -W/2 + PHOTO_R*2 + 14;
  node.append('text')
    .attr('x', textX).attr('y', -8)
    .attr('font-size', '11px').attr('font-weight', '600')
    .attr('fill', '#2d1f0e')
    .text(d => truncate(d.data.full_name || d.data.first_name, 13));

  // Dates text
  node.append('text')
    .attr('x', textX).attr('y', 8)
    .attr('font-size', '9.5px').attr('fill', '#7a6248')
    .text(d => cleanDates(d.data));
}

function nodeColor(p) {
  if (p.death) return '#ede8e0';   // deceased: slightly darker
  if (p.photo) return '#fefbf6';   // has photo: warm white
  return '#faf6f0';                // default: warm
}

function drawInitial(g, p, cx, cy, r) {
  g.append('circle').attr('cx', cx).attr('cy', cy).attr('r', r).attr('fill', '#d4c4a8');
  g.append('text').attr('x', cx).attr('y', cy + 5)
   .attr('text-anchor', 'middle').attr('font-size', '14px')
   .attr('font-weight', 'bold').attr('fill', '#7a6248')
   .text((p.first_name || p.full_name || '?')[0]);
}

// ── HELPERS ───────────────────────────────────────
function truncate(str, n) {
  if (!str) return '';
  return str.length > n ? str.slice(0, n-1) + '…' : str;
}

function extractYear(s) {
  if (!s) return '';
  const m = s.match(/\b(\d{4})\b/);
  return m ? m[1] : '';
}

function cleanDates(p) {
  const b = extractYear(p.birth), d = extractYear(p.death);
  if (!b) return '';
  return d ? `${b} – ${d}` : b;
}

// ── SEARCH ────────────────────────────────────────
function onSearch(q) {
  const term = q.trim().toLowerCase();
  if (!term) {
    gNodes.selectAll('.node').classed('found', false).classed('dim', false);
    return;
  }
  const matched = new Set();
  allNodes.forEach(n => {
    const name = (n.data.full_name || n.data.first_name || '').toLowerCase();
    if (name.includes(term)) matched.add(n.id);
  });

  gNodes.selectAll('.node')
    .classed('found', d => matched.has(d.id))
    .classed('dim', d => !matched.has(d.id));

  // Pan to first match
  if (matched.size > 0) {
    const first = allNodes.find(n => matched.has(n.id));
    if (first) panTo(first.x, first.y, 0.8);
  }
}

// ── ORPHANS ───────────────────────────────────────
function showOrphans() {
  const connected = new Set(allLinks.flatMap(l => [l.s, l.t]));
  const orphans = allNodes.filter(n => !connected.has(n.id));
  if (!orphans.length) { alert('Все люди имеют связи!'); return; }

  const names = orphans.map(o => o.data.full_name || o.id).join('\n');
  alert(`${orphans.length} человек без связей:\n${names}`);

  gNodes.selectAll('.node')
    .classed('found', d => orphans.some(o => o.id === d.id))
    .classed('dim', d => !orphans.some(o => o.id === d.id));
}

// ── VIEW CONTROLS ─────────────────────────────────
function panTo(x, y, scale) {
  const sw = document.getElementById('svg').clientWidth;
  const sh = document.getElementById('svg').clientHeight;
  svgSel.transition().duration(600).call(
    zoomBeh.transform,
    d3.zoomIdentity.translate(sw/2 - x * scale, sh/2 - y * scale).scale(scale)
  );
}

function changeZoom(f) {
  svgSel.transition().duration(200).call(zoomBeh.scaleBy, f);
}

function resetView() {
  svgSel.transition().duration(600).call(
    zoomBeh.transform,
    d3.zoomIdentity.translate(INIT_TX, INIT_TY).scale(INIT_SCALE)
  );
}

// ── MODAL ─────────────────────────────────────────
function openModal(p) {
  const block = (label, arr) => {
    if (!arr || !arr.length) return '';
    const links = arr.map(id => {
      const q = PERSONS[id];
      if (!q) return '';
      return `<span class="badge badge-outline mr-1 mb-1 cursor-pointer hover:bg-base-200"
        onclick="closeModal();setTimeout(()=>{highlightAndGo('${id}')},200)">${q.full_name || id}</span>`;
    }).join('');
    return `<div class="mt-3"><div class="text-xs font-bold uppercase text-gray-400 mb-1">${label}</div>${links}</div>`;
  };

  document.getElementById('modal-content').innerHTML = `
    <h3 class="font-bold text-xl">${p.full_name || p.first_name}</h3>
    <div class="text-gray-500 text-sm mb-3">${cleanDates(p)}${p.profession ? ' · ' + p.profession : ''}</div>
    ${p.photo ? `<img src="photos/${p.photo}" class="w-full max-h-56 object-contain rounded-xl bg-base-200 mb-3">` : ''}
    <div class="divider my-2">Семья</div>
    ${block('💑 Супруги', p.spouses)}
    ${block('👨‍👩‍👧 Родители', p.parents)}
    ${block('👶 Дети', p.children)}
    ${block('👫 Братья / сёстры', p.siblings)}
  `;
  document.getElementById('modal').showModal();
}

function closeModal() {
  document.getElementById('modal').close();
}

function highlightAndGo(id) {
  gNodes.selectAll('.node').classed('found', false).classed('dim', false);
  const n = allNodes.find(n => n.id === id);
  if (!n) return;
  gNodes.selectAll('.node')
    .classed('found', d => d.id === id)
    .classed('dim', d => d.id !== id);
  panTo(n.x, n.y, 1.2);
  setTimeout(() => openModal(PERSONS[id]), 400);
}

init();
</script>
</body>
</html>
