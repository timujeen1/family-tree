<!DOCTYPE html>
<html lang="ru" data-theme="autumn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Родовое дерево Шаповаловых</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5.5.14/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .person-card { cursor: pointer; transition: transform .15s, box-shadow .15s; }
    .person-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.15); }
    .avatar-placeholder { background: linear-gradient(135deg, #d4a373, #a48262); }
    .rel-link { cursor: pointer; color: oklch(45% 0.22 264); text-decoration: underline; }
    .rel-link:hover { color: oklch(35% 0.22 264); }
    .tree-box {
      border: 2px solid oklch(70% 0.12 60);
      border-radius: 12px; padding: 8px 14px;
      background: white; cursor: pointer;
      min-width: 120px; text-align: center; font-size: .8rem;
    }
    .tree-box:hover { background: oklch(97% 0.03 80); }
    .tree-box.center { border-color: oklch(55% 0.22 264); border-width: 3px; }
    .generation-label { font-size: .7rem; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body class="bg-base-200 min-h-screen">

<!-- HEADER -->
<div class="navbar bg-base-100 shadow-md sticky top-0 z-30">
  <div class="flex-1">
    <span class="text-xl font-bold px-4">🌳 Родовое дерево Шаповаловых</span>
  </div>
  <div class="flex-none gap-2 px-4">
    <div class="tabs tabs-boxed">
      <a class="tab tab-active" id="tab-cards" onclick="showTab('cards')">Все люди</a>
      <a class="tab" id="tab-tree" onclick="showTab('tree')">Дерево</a>
      <a class="tab" id="tab-stats" onclick="showTab('stats')">Статистика</a>
    </div>
  </div>
</div>

<!-- SEARCH -->
<div class="container mx-auto px-4 pt-6 pb-2" id="search-bar">
  <div class="flex items-center gap-3">
    <input id="search-input" type="text" placeholder="🔍 Поиск по имени..."
      class="input w-full max-w-md" oninput="filterCards(this.value)" />
    <span class="text-sm text-base-content/60" id="count-label"></span>
  </div>
</div>

<!-- CARDS VIEW -->
<div id="view-cards" class="container mx-auto px-4 py-4">
  <div id="cards-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4"></div>
</div>

<!-- TREE VIEW -->
<div id="view-tree" class="hidden container mx-auto px-4 py-6">
  <div class="flex gap-4 mb-6 items-center flex-wrap">
    <label class="font-semibold">Центральная персона:</label>
    <select id="tree-select" class="select select-sm" onchange="renderTree(this.value)"></select>
  </div>
  <div id="tree-container" class="overflow-x-auto pb-4"></div>
</div>

<!-- STATS VIEW -->
<div id="view-stats" class="hidden container mx-auto px-4 py-6">
  <div id="stats-content" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
</div>

<!-- MODAL (DaisyUI 5 native dialog) -->
<dialog id="person-modal" class="modal">
  <div class="modal-box w-full max-w-lg">
    <div id="modal-content"></div>
  </div>
  <form method="dialog" class="modal-backdrop"><button>close</button></form>
</dialog>

<script>
let PERSONS = {};

async function loadData() {
  try {
    const r = await fetch('persons.json');
    PERSONS = await r.json();
  } catch(e) {
    console.warn('Could not load persons.json:', e);
  }
  init();
}

function init() {
  renderCards(Object.values(PERSONS));
  populateTreeSelect();
  renderStats();
  updateCount(Object.values(PERSONS).length);
  const def = 'Шаповалов Тимофей_1';
  if (PERSONS[def]) { document.getElementById('tree-select').value = def; renderTree(def); }
}

// ─── Helpers ────────────────────────────────────────────────
function photoUrl(p) { return p.photo ? `photos/${p.photo}` : null; }

function personDates(p) {
  let s = '';
  if (p.birth) s += p.birth;
  if (p.death) s += ` – ${p.death}`;
  return s;
}

function avatarHtml(p, size = 'w-16 h-16') {
  const url = photoUrl(p);
  const initials = (p.first_name || p.full_name || '?')[0].toUpperCase();
  if (url) {
    return `<div class="avatar"><div class="${size} rounded-full overflow-hidden">
      <img src="${url}" alt="${p.full_name}" loading="lazy"
        onerror="this.parentElement.outerHTML='<div class=\\"avatar placeholder\\"><div class=\\"${size} rounded-full avatar-placeholder text-white text-xl font-bold flex items-center justify-center\\"><span>${initials}</span></div></div>'">
    </div></div>`;
  }
  return `<div class="avatar placeholder"><div class="${size} rounded-full avatar-placeholder text-white text-xl font-bold flex items-center justify-center"><span>${initials}</span></div></div>`;
}

// ─── Cards ───────────────────────────────────────────────────
function renderCards(persons) {
  document.getElementById('cards-grid').innerHTML = persons.map(p => `
    <div class="card card-sm bg-base-100 shadow person-card" onclick="openPerson('${p.key}')">
      <div class="card-body items-center text-center gap-2 pt-4">
        ${avatarHtml(p, 'w-16 h-16')}
        <div>
          <div class="font-semibold text-sm leading-tight">${p.full_name || p.first_name || '?'}</div>
          ${personDates(p) ? `<div class="text-xs text-base-content/60">${personDates(p)}</div>` : ''}
          ${p.profession ? `<div class="badge badge-sm badge-outline mt-1">${p.profession.split('  ')[0].substring(0,22)}</div>` : ''}
        </div>
      </div>
    </div>`).join('');
}

function filterCards(q) {
  const norm = q.toLowerCase().trim();
  const filtered = norm
    ? Object.values(PERSONS).filter(p =>
        (p.full_name || '').toLowerCase().includes(norm) ||
        (p.first_name || '').toLowerCase().includes(norm) ||
        (p.surname || '').toLowerCase().includes(norm))
    : Object.values(PERSONS);
  renderCards(filtered);
  updateCount(filtered.length);
}

function updateCount(n) {
  document.getElementById('count-label').textContent = `${n} чел.`;
}

// ─── Modal ───────────────────────────────────────────────────
function openPerson(key) {
  const p = PERSONS[key];
  if (!p) return;

  const relSection = (label, keys, emoji) => {
    const items = (keys || []).filter(k => PERSONS[k]);
    if (!items.length) return '';
    const links = items.map(k => {
      const rp = PERSONS[k];
      return `<span class="rel-link" onclick="openPerson('${k}')">${rp.full_name || rp.first_name}</span>`;
    }).join(', ');
    return `<div class="mb-2"><span class="text-sm font-semibold">${emoji} ${label}:</span> <span class="text-sm">${links}</span></div>`;
  };

  document.getElementById('modal-content').innerHTML = `
    <form method="dialog"><button class="btn btn-sm btn-circle btn-ghost absolute right-4 top-4">✕</button></form>
    <h3 class="text-xl font-bold mb-4 pr-8">${p.full_name || p.first_name || '?'}</h3>
    <div class="flex gap-4 mb-4">
      ${avatarHtml(p, 'w-24 h-24')}
      <div class="flex-1">
        ${p.birth ? `<div class="text-sm"><span class="font-medium">Дата рождения:</span> ${p.birth}</div>` : ''}
        ${p.death ? `<div class="text-sm"><span class="font-medium">Дата смерти:</span> ${p.death}</div>` : ''}
        ${p.profession ? `<div class="mt-1"><span class="badge badge-outline">${p.profession}</span></div>` : ''}
      </div>
    </div>
    <div class="divider my-2"></div>
    ${relSection('Супруг(а)', p.spouses, '💑')}
    ${relSection('Родители', p.parents, '👨‍👩‍👧')}
    ${relSection('Братья / Сёстры', p.siblings, '👫')}
    ${relSection('Дети', p.children, '👶')}
    <div class="modal-action mt-4">
      <button class="btn btn-sm btn-outline" onclick="goToTree('${p.key}')">🌳 Показать в дереве</button>
      <form method="dialog"><button class="btn btn-sm">Закрыть</button></form>
    </div>`;

  document.getElementById('person-modal').showModal();
}

function goToTree(key) {
  document.getElementById('person-modal').close();
  document.getElementById('tree-select').value = key;
  renderTree(key);
  showTab('tree');
}

// ─── Tabs ────────────────────────────────────────────────────
function showTab(tab) {
  ['cards', 'tree', 'stats'].forEach(t => {
    document.getElementById(`view-${t}`).classList.toggle('hidden', t !== tab);
    document.getElementById(`tab-${t}`).classList.toggle('tab-active', t === tab);
  });
  document.getElementById('search-bar').classList.toggle('hidden', tab !== 'cards');
}

// ─── Tree View ───────────────────────────────────────────────
function populateTreeSelect() {
  const sel = document.getElementById('tree-select');
  sel.innerHTML = Object.values(PERSONS)
    .sort((a, b) => (a.full_name || '').localeCompare(b.full_name || '', 'ru'))
    .map(p => `<option value="${p.key}">${p.full_name || p.first_name}</option>`)
    .join('');
}

function treeBox(key, isCenter = false) {
  const p = PERSONS[key];
  if (!p) return '';
  const url = photoUrl(p);
  const initials = (p.first_name || p.full_name || '?')[0];
  const imgHtml = url
    ? `<img src="${url}" class="w-10 h-10 rounded-full object-cover mx-auto mb-1" onerror="this.style.display='none'">`
    : `<div class="w-10 h-10 rounded-full avatar-placeholder text-white font-bold flex items-center justify-center mx-auto mb-1">${initials}</div>`;
  return `<div class="tree-box${isCenter ? ' center' : ''} inline-block" onclick="openPerson('${key}')">
    ${imgHtml}
    <div class="font-semibold leading-tight">${p.full_name || p.first_name}</div>
    ${p.birth ? `<div class="text-gray-400" style="font-size:.7rem">${p.birth.substring(0,4)}</div>` : ''}
  </div>`;
}

function renderTree(centerKey) {
  const p = PERSONS[centerKey];
  if (!p) return;

  const grandparents = [];
  (p.parents || []).forEach(pk => {
    const par = PERSONS[pk];
    if (par) (par.parents || []).forEach(gpk => { if (!grandparents.includes(gpk)) grandparents.push(gpk); });
  });

  const grandchildren = [];
  (p.children || []).forEach(ck => {
    (PERSONS[ck]?.children || []).forEach(gck => { if (!grandchildren.includes(gck)) grandchildren.push(gck); });
  });

  const makeRow = (keys, label, centerIdx = -1) => {
    if (!keys.length) return '';
    const boxes = keys.map((k, i) => `<div class="flex flex-col items-center mx-2">${treeBox(k, i === centerIdx)}</div>`).join('');
    return `<div class="mb-1 text-center generation-label">${label}</div>
      <div class="flex justify-center flex-wrap gap-2 mb-4">${boxes}</div>`;
  };

  const centerRow = `
    <div class="mb-1 text-center generation-label">Персона</div>
    <div class="flex justify-center items-center gap-3 mb-4">
      ${treeBox(centerKey, true)}
      ${(p.spouses || []).length ? '<div class="text-2xl">💑</div>' + p.spouses.map(sk => treeBox(sk)).join('') : ''}
    </div>`;

  document.getElementById('tree-container').innerHTML = `
    <div class="min-w-max mx-auto py-4">
      ${grandparents.length ? makeRow(grandparents, '🧓 Прародители') : ''}
      ${makeRow(p.parents || [], '👨‍👩‍👧 Родители')}
      ${centerRow}
      ${(p.children || []).length ? makeRow(p.children, '👶 Дети') : ''}
      ${grandchildren.length ? makeRow(grandchildren.slice(0, 12), '🍼 Внуки') : ''}
    </div>`;
}

// ─── Stats ───────────────────────────────────────────────────
function renderStats() {
  const persons = Object.values(PERSONS);
  const total = persons.length;
  const withPhoto = persons.filter(p => p.photo).length;
  const deceased = persons.filter(p => p.death).length;
  const withSpouse = persons.filter(p => p.spouses?.length).length;
  const withChildren = persons.filter(p => p.children?.length).length;

  const birthYears = persons.map(p => {
    const m = (p.birth || '').match(/\b(\d{4})\b/);
    return m ? parseInt(m[1]) : null;
  }).filter(Boolean).sort();
  const oldest = birthYears[0], newest = birthYears[birthYears.length - 1];
  const generations = Math.round((newest - oldest) / 25);

  const surnames = {};
  persons.forEach(p => { if (p.surname) surnames[p.surname] = (surnames[p.surname] || 0) + 1; });
  const topSurnames = Object.entries(surnames).sort((a, b) => b[1] - a[1]).slice(0, 8);

  const statCard = (icon, value, title, sub = '') => `
    <div class="card bg-base-100 shadow">
      <div class="card-body">
        <div class="text-3xl">${icon}</div>
        <div class="text-4xl font-bold">${value}</div>
        <div class="font-semibold text-base-content/80">${title}</div>
        ${sub ? `<div class="text-sm text-base-content/60">${sub}</div>` : ''}
      </div>
    </div>`;

  document.getElementById('stats-content').innerHTML = `
    ${statCard('👥', total, 'Человек в дереве', 'Все задокументированные')}
    ${statCard('📷', withPhoto, 'С фотографией', `${Math.round(withPhoto / total * 100)}% от всех`)}
    ${statCard('🕯️', deceased, 'Ушедших', 'Записана дата смерти')}
    ${statCard('💑', Math.round(withSpouse / 2), 'Семейных пар', 'Супружеских союзов')}
    ${statCard('👶', withChildren, 'С детьми', 'Родителей в дереве')}
    ${statCard('🌳', `~${generations}`, 'Поколений', `${oldest} – ${newest} гг.`)}
    <div class="card bg-base-100 shadow col-span-1 sm:col-span-2 lg:col-span-3">
      <div class="card-body">
        <h3 class="card-title">👨‍👩‍👧 Фамилии</h3>
        <div class="flex flex-wrap gap-2 mt-2">
          ${topSurnames.map(([sur, cnt]) =>
            `<div class="badge badge-lg badge-outline">${sur} <span class="ml-1 font-bold">${cnt}</span></div>`
          ).join('')}
        </div>
      </div>
    </div>`;
}

loadData();
</script>
</body>
</html>
